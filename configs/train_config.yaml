# ============================================================
# YOLOv5-seg 训练参数配置文件
# 修改此文件后直接运行 python scripts/train.py 即可生效
# ============================================================

# ── 模型 ─────────────────────────────────────────────────────
# 预训练权重路径；首次运行时若文件不存在将自动从 ultralytics 服务器下载
weights: yolov5/yolov5s-seg.pt

# ── 训练基础参数 ──────────────────────────────────────────────
epochs: 100           # 最大训练轮数
batch_size: 8         # 每批图片数量；显存不足时可调小为 4
imgsz: 640            # 训练/验证输入图片尺寸（像素），必须为 32 的倍数

# ── 设备 ──────────────────────────────────────────────────────
# "0"   → 使用第 0 块 GPU（推荐）
# "cpu" → 仅使用 CPU（速度较慢）
# "0,1" → 多 GPU（Windows 下需额外配置，不推荐）
device: "0"

# ── 优化器 ────────────────────────────────────────────────────
optimizer: SGD        # 可选: SGD / Adam / AdamW

# ── 收敛控制 ──────────────────────────────────────────────────
patience: 50          # EarlyStopping：连续 N 轮 val mAP 无提升则停止
                      # 样本量小时建议适当增大，防止过早停止

# ── Checkpoint 保存 ──────────────────────────────────────────
# 始终自动保存 best.pt 和 last.pt
# save_period > 0 时，额外每 N 轮保存一次带轮数编号的 checkpoint
save_period: -1       # -1 表示仅保存 best/last，不额外保存

# ── DataLoader 线程 ──────────────────────────────────────────
# Windows 下 num_workers > 2 可能导致 DataLoader 死锁
# train.py 会自动将此值钳制到 min(workers, 2)
workers: 2

# ── 结果保存路径 ──────────────────────────────────────────────
# 训练结果将保存在 <project>/<name>/ 目录下
# 若同名目录已存在会自动递增为 exp2, exp3 ...
project: runs/train-seg
name: exp
